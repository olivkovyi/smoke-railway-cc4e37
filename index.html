<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculateur de Délai de Livraison | Outil Gratuit</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
        }
        
        h1 {
            color: #1a202c;
            font-size: 32px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #718096;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            display: none;
        }
        
        .result h2 {
            color: #1a202c;
            font-size: 20px;
            margin-bottom: 10px;
        }
        
        .result-date {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }
        
        .info {
            margin-top: 30px;
            padding: 15px;
            background: #edf2f7;
            border-radius: 8px;
            font-size: 14px;
            color: #4a5568;
        }
        
        .info strong {
            color: #2d3748;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📦 Calculateur de Délai de Livraison</h1>
        <p class="subtitle">Estimez la date de livraison de votre colis</p>
        
        <div class="form-group">
            <label for="start-date">Date d'envoi :</label>
            <input type="date" id="start-date">
        </div>
        
        <div class="form-group">
            <label for="days">Délai de livraison (jours) :</label>
            <input type="number" id="days" value="5" min="1" max="60">
        </div>
        
        <button onclick="calculate()">Calculer la date de livraison</button>
        
        <div class="result" id="result">
            <h2>📅 Date de livraison estimée :</h2>
            <div class="result-date" id="delivery-date"></div>
        </div>
        
        <div class="info">
            <strong>ℹ️ Note :</strong> Ce calculateur estime la date de livraison en jours ouvrés. 
            Les week-ends et jours fériés ne sont pas inclus dans le calcul.
        </div>
    </div>
    
    <script>
        // Set today's date as default
        document.getElementById('start-date').valueAsDate = new Date();
        
        function calculate() {
            const startDate = new Date(document.getElementById('start-date').value);
            const days = parseInt(document.getElementById('days').value);
            
            let deliveryDate = new Date(startDate);
            let addedDays = 0;
            
            while (addedDays < days) {
                deliveryDate.setDate(deliveryDate.getDate() + 1);
                
                // Skip weekends (0 = Sunday, 6 = Saturday)
                if (deliveryDate.getDay() !== 0 && deliveryDate.getDay() !== 6) {
                    addedDays++;
                }
            }
            
            // Format date in French
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = deliveryDate.toLocaleDateString('fr-FR', options);
            
            document.getElementById('delivery-date').textContent = formattedDate;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
